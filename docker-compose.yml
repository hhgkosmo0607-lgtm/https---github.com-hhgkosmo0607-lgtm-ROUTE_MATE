# 14.1절: web / db / redis 3-서비스 구성 (캡스톤 시연 규모)
services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALLERGY_ENCRYPTION_KEY: ${ALLERGY_ENCRYPTION_KEY:?ALLERGY_ENCRYPTION_KEY is required (base64, 32 bytes)}
      DATABASE_URL: mysql+pymysql://routemate:${MYSQL_PASSWORD}@db:3306/routemate
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: routemate
      MYSQL_USER: routemate
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
