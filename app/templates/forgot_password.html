{% extends "base.html" %}
{% block title %}비밀번호 재설정 — RouteMate{% endblock %}
{% block content %}
<div class="card" style="max-width:380px; margin:40px auto;">
  <h1>비밀번호 재설정</h1>
  <p class="muted">가입한 이메일을 입력하면 재설정 링크를 보내드립니다.</p>
  <form id="forgot-form" class="stack">
    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" required autocomplete="email">
    </div>
    <button type="submit">재설정 링크 받기</button>
  </form>
  <p id="forgot-done" class="muted" style="margin-top:14px;" hidden></p>
  <p class="muted" style="margin-top:16px;"><a href="{{ url_for('views.login_page') }}">로그인으로 돌아가기</a></p>
</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce() }}">
  document.getElementById("forgot-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector("button");
    btn.disabled = true;
    try {
      const data = await api.post("/api/auth/password-reset-request", {
        email: document.getElementById("email").value,
      });
      const done = document.getElementById("forgot-done");
      done.textContent = data.message;
      done.hidden = false;
    } catch (err) {
      showToast(err.message, true);
    } finally {
      btn.disabled = false;
    }
  });
</script>
{% endblock %}
