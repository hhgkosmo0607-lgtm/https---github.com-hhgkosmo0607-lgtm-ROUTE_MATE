{% extends "base.html" %}
{% block title %}새 비밀번호 설정 — RouteMate{% endblock %}
{% block content %}
<div class="card" style="max-width:380px; margin:40px auto;">
  <h1>새 비밀번호 설정</h1>
  <form id="reset-form" class="stack">
    <div class="field">
      <label for="password">새 비밀번호</label>
      <input type="password" id="password" required minlength="8" autocomplete="new-password"
             placeholder="8자 이상, 영문+숫자">
    </div>
    <div id="reset-error" class="error-text" hidden></div>
    <button type="submit">비밀번호 변경</button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce() }}">
  const RESET_TOKEN = {{ token | tojson }};
  document.getElementById("reset-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("reset-error");
    errorEl.hidden = true;
    try {
      await api.post("/api/auth/password-reset", {
        token: RESET_TOKEN,
        password: document.getElementById("password").value,
      });
      showToast("비밀번호가 변경되었습니다.");
      setTimeout(() => (window.location.href = "{{ url_for('views.login_page') }}"), 800);
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.hidden = false;
    }
  });
</script>
{% endblock %}
