{% extends "base.html" %}
{% block title %}지도 보기 — RouteMate{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/leaflet/leaflet.css') }}">
{% endblock %}
{% block content %}
<h1>지도 보기</h1>
{% include "_trip_nav.html" %}

<div class="row" style="margin-bottom:16px;">
  <label style="margin:0; width:auto;">Day 필터</label>
  <select id="day-filter" style="width:auto;"></select>
  <span class="muted">지도: OpenStreetMap</span>
</div>

<div class="grid-2">
  <div id="map" style="height:420px; border-radius:var(--radius); border:1px solid var(--color-border);"></div>
  <div id="day-summary" class="stack"></div>
</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce() }}">window.TRIP_ID = {{ trip_id }};</script>
<script nonce="{{ csp_nonce() }}" src="{{ url_for('static', filename='vendor/leaflet/leaflet.js') }}"></script>
<script src="{{ url_for('static', filename='js/trip_map.js') }}"></script>
{% endblock %}
