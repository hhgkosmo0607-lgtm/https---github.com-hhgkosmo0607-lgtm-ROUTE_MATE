<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RouteMate{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="nav">
    <a class="brand" href="{{ url_for('views.landing') }}">RouteMate</a>
    <nav>
      {% if current_user.is_authenticated %}
        <a href="{{ url_for('views.trips_page') }}">내 여행</a>
        <a href="{{ url_for('views.mypage') }}">마이페이지</a>
        <button id="logout-btn" class="link-btn" type="button">로그아웃</button>
      {% else %}
        <a href="{{ url_for('views.login_page') }}">로그인</a>
        <a href="{{ url_for('views.signup_page') }}">회원가입</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script nonce="{{ csp_nonce() }}">
    document.getElementById("logout-btn")?.addEventListener("click", async () => {
      try {
        await api.post("/api/auth/logout");
      } finally {
        window.location.href = "{{ url_for('views.landing') }}";
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
