{% extends "base.html" %}
{% block title %}회원가입 — RouteMate{% endblock %}
{% block content %}
<div class="card" style="max-width:420px; margin:40px auto;">
  <h1>회원가입</h1>
  <form id="signup-form" class="stack">
    <div class="field">
      <label for="nickname">닉네임</label>
      <input type="text" id="nickname" required maxlength="30">
    </div>
    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" required autocomplete="email">
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input type="password" id="password" required minlength="8" autocomplete="new-password">
      <p class="muted" style="margin-top:4px;">8자 이상, 영문과 숫자를 포함해야 합니다.</p>
    </div>
    <div id="signup-error" class="error-text" hidden></div>
    <button type="submit">가입하기</button>
  </form>
  <p class="muted" style="margin-top:16px;">
    이미 계정이 있으신가요? <a href="{{ url_for('views.login_page') }}">로그인</a>
  </p>
</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce() }}">
  document.getElementById("signup-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("signup-error");
    errorEl.hidden = true;
    const submitBtn = e.target.querySelector("button[type=submit]");
    submitBtn.disabled = true;
    try {
      await api.post("/api/auth/signup", {
        nickname: document.getElementById("nickname").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
      });
      await api.post("/api/auth/login", {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
      });
      window.location.href = "{{ url_for('views.mypage') }}?welcome=1";
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.hidden = false;
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
{% endblock %}
